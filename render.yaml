services:
  - type: web_service
    name: movies-explorer-backend
    env: node
    root: Movies-Explorer2/backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        value: ""
      - key: MONGO_URI
        value: ""
      - key: PORT
        value: "5000"
      - key: CLIENT_URL
        value: https://movies-explorer2-2.onrender.com

  - type: static_site
    name: movies-explorer-frontend
    root: Movies-Explorer2/frontend
    buildCommand: npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://movies-explorer2-3.onrender.com/api
